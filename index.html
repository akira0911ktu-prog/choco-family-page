<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>🐾 家族限定</title>
<style>
  :root {
    --bg: #f7f3ea;
    --paper: #fffbf3;
    --ink: #2a2a2a;
    --muted: #7a7a7a;
    --accent: #8a5a3a;
    --line: #d9cfb8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", "YuMincho", "MS PMincho", serif;
    line-height: 1.9;
    font-size: 17px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 120px;
    background: var(--paper);
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }
  @media (max-width: 600px) {
    body { font-size: 16px; }
    .wrap { padding: 24px 18px 80px; }
  }

  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  #gate .box {
    max-width: 420px; width: 100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 32px 28px;
    text-align: center;
  }
  #gate h2 { margin: 0 0 12px; font-size: 20px; color: var(--accent); }
  #gate p { margin: 0 0 16px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  #gate input {
    width: 100%; padding: 12px; font-size: 16px;
    border: 1px solid var(--line); border-radius: 4px;
    margin-bottom: 12px;
    font-family: inherit;
  }
  #gate button {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 4px;
    font-size: 15px; cursor: pointer;
    font-family: inherit;
  }
  #gate .err { color: #c04040; font-size: 13px; margin-top: 10px; min-height: 1em; }
  .hidden { display: none !important; }

  h1 { font-size: 28px; margin: 0 0 8px; color: var(--accent); letter-spacing: 0.05em; }
  h2 {
    font-size: 20px; margin: 48px 0 16px; padding-top: 24px;
    border-top: 1px solid var(--line); color: var(--accent);
    letter-spacing: 0.04em;
  }
  h3 { font-size: 16px; margin: 32px 0 12px; color: var(--accent); }
  p { margin: 0 0 1em; }
  blockquote {
    margin: 1.5em 0; padding: 12px 20px;
    background: #f0e8d4; border-left: 3px solid var(--accent);
    color: #4a3a2a; font-size: 0.92em;
  }
  blockquote p { margin: 0.5em 0; }
  hr { border: none; border-top: 1px dashed var(--line); margin: 32px 0; }
  a { color: var(--accent); }
  strong { color: #3a2a1a; }
  .section-break {
    text-align: center; color: var(--muted);
    margin: 24px 0; letter-spacing: 0.5em;
  }
  ul { padding-left: 1.4em; }
  li { margin: 4px 0; }
  .toc {
    background: #f0e8d4; border-radius: 6px;
    padding: 16px 16px 16px 36px; margin: 16px 0 32px;
    font-size: 0.92em;
  }
  .toc li { list-style: none; position: relative; }
  .toc li::before {
    content: ""; position: absolute; left: -18px; top: 0.8em;
    width: 10px; height: 1px; background: var(--accent);
  }
  .toc a { text-decoration: none; color: var(--ink); }
  .toc a:hover { color: var(--accent); }

  .switcher {
    position: sticky; top: 0;
    background: var(--paper); padding: 12px 0;
    margin: 0 -24px 24px; padding-left: 24px; padding-right: 24px;
    border-bottom: 1px solid var(--line);
    z-index: 100; display: flex; gap: 12px;
  }
  .switcher button {
    flex: 1; padding: 10px 14px;
    background: transparent; border: 1px solid var(--line);
    border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 14px; color: var(--ink);
  }
  .switcher button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .meta {
    color: var(--muted); font-size: 13px;
    margin: 0 0 24px; padding: 12px 16px;
    background: #f5ecd8; border-radius: 4px;
  }
  .book { animation: fade 0.4s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  details summary { cursor: pointer; color: var(--accent); font-weight: bold; margin: 12px 0; }

  @media print {
    #gate, .switcher { display: none !important; }
    body { background: #fff; font-size: 11pt; }
    .wrap { box-shadow: none; max-width: none; padding: 20px; }
    .book.hidden { display: block !important; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h2>🐾 家族限定ページ</h2>
    <p>
      チョコの大冒険（加藤家の記録）。<br>
      実名で書かれています。外部共有はご遠慮ください。<br><br>
      合言葉をお知らせした家族・協力者の方のみ、お進みください。
    </p>
    <input type="password" id="pw" placeholder="合言葉を入力" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="btn" onclick="unlock()">開く</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div class="wrap hidden" id="content"></div>

<template id="tpl">
  <div>
    <div class="meta">
      <strong>家族・協力者限定の記録です。</strong><br>
      外部への共有・転載はご遠慮ください。<br>
      感想・修正のご希望：家族LINEまで
    </div>
    <div class="switcher">
      <button id="btn1" class="active" onclick="showBook(1)">① チョコちゃんを探せ<br><small>（飼い主視点）</small></button>
      <button id="btn2" onclick="showBook(2)">② 大冒険<br><small>（チョコの視点）</small></button>
    </div>
    <div id="book1" class="book">
      <details open><summary>📑 目次（タップで展開）</summary><div id="toc1"></div></details>
      <div id="body1"></div>
    </div>
    <div id="book2" class="book hidden">
      <details open><summary>📑 目次（タップで展開）</summary><div id="toc2"></div></details>
      <div id="body2"></div>
    </div>
  </div>
</template>

  function b64decode(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function deriveKey(password, salt, iterations) {
    const pwKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
      pwKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function unlock() {
    const pw = document.getElementById("pw").value;
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");
    err.innerHTML = "";
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>開いています…';

    try {
      const salt = b64decode(PAYLOAD.salt);
      const iv = b64decode(PAYLOAD.iv);
      const ct = b64decode(PAYLOAD.ct);
      const key = await deriveKey(pw, salt, PAYLOAD.iter);
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
      const json = new TextDecoder().decode(plain);
      const payload = JSON.parse(json);
      render(payload);
      // Remember for this session
      try { sessionStorage.setItem("choco_pw", pw); } catch(e) {}
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "開く";
      err.textContent = "合言葉が違うか、データが壊れています";
    }
  }

  function render(payload) {
    document.getElementById("gate").classList.add("hidden");
    const content = document.getElementById("content");
    const tpl = document.getElementById("tpl");
    content.appendChild(tpl.content.cloneNode(true));
    content.classList.remove("hidden");
    document.getElementById("toc1").innerHTML = payload.book1_toc;
    document.getElementById("body1").innerHTML = payload.book1_html;
    document.getElementById("toc2").innerHTML = payload.book2_toc;
    document.getElementById("body2").innerHTML = payload.book2_html;
  }

  function showBook(n) {
    document.getElementById("book1").classList.toggle("hidden", n !== 1);
    document.getElementById("book2").classList.toggle("hidden", n !== 2);
    document.getElementById("btn1").classList.toggle("active", n === 1);
    document.getElementById("btn2").classList.toggle("active", n === 2);
    window.scrollTo(0, 0);
  }

  // Enter key
  document.getElementById("pw").addEventListener("keyup", (e) => {
    if (e.key === "Enter") unlock();
  });

  // Auto-unlock within the session
  (async () => {
    try {
      const saved = sessionStorage.getItem("choco_pw");
      if (saved) {
        document.getElementById("pw").value = saved;
        await unlock();
      }
    } catch(e) {}
  })();
</script>
